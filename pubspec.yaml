name: dartapi_auth
description: >
  DEPRECATED: Auth is now part of dartapi_core ^0.1.0.
  This package re-exports everything from dartapi_core for one-version backwards compatibility.
  Migrate by replacing `dartapi_auth` with `dartapi_core` in your pubspec.
version: 0.0.11
repository: https://github.com/akashgk/dartapi_auth
homepage: https://github.com/akashgk/dartapi_auth
issue_tracker: https://github.com/akashgk/dartapi_auth/issues

environment:
  sdk: ^3.7.0

dependencies:
  dartapi_core: ^0.1.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0

false_secrets:
  - /test/jwt_service_test.dart
